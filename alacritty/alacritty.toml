[env]
TERM = "alacritty"

[window]
opacity = 1.0
padding = { x = 4, y = 4 }

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 11

[colors.primary]
background = "#000000"
foreground = "#e2e8f0"

[colors.normal]
black = "#000000"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#9333ea"
magenta = "#9333ea"
cyan = "#06b6d4"
white = "#e2e8f0"

[colors.bright]
black = "#494d64"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#9333ea"
magenta = "#9333ea"
cyan = "#06b6d4"
white = "#e2e8f0"

[cursor]
style = "Beam"

[selection]
save_to_clipboard = true


